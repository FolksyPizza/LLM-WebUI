<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM WebUI - Sign In</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-shell">
    <section class="auth-card" aria-live="polite">
      <h1>Sign In</h1>
      <p class="sub">Local model workspace</p>

      <form id="signInForm" class="form show">
        <label>
          Email or Username
          <input id="signinIdentifier" type="text" autocomplete="username" required />
        </label>
        <label>
          Password
          <input id="signinPassword" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="primary">Sign In</button>
        <p class="switch-line">
          <button type="button" id="showCreate" class="text-btn">Create account</button>
        </p>
      </form>

      <form id="createForm" class="form">
        <label>
          Name (optional)
          <input id="createName" type="text" autocomplete="name" />
        </label>
        <label>
          Email
          <input id="createEmail" type="email" autocomplete="email" required />
        </label>
        <label>
          Password
          <input id="createPassword" type="password" autocomplete="new-password" required />
        </label>
        <label>
          Confirm Password
          <input id="createConfirmPassword" type="password" autocomplete="new-password" required />
        </label>
        <button type="submit" class="primary">Create account</button>
        <p class="switch-line">
          <button type="button" id="showSignIn" class="text-btn">Back to Sign In</button>
        </p>
      </form>

      <p id="authMessage" class="message" role="status"></p>

      <div class="footer-actions">
        <a class="demo-link" href="/">Back to chat</a>
      </div>
    </section>
  </main>
  <script src="login.js"></script>
</body>
</html>
